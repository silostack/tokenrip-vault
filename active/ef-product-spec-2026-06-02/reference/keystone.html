<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEALBOARD — Deal Intelligence & Sales Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pine:#0f3a2c; --pine2:#16513b; --fairway:#2f7a55; --moss:#4f8f6a;
    --gold:#c39a3e; --gold2:#a6802c; --sand:#e9e0c9;
    --cream:#f6f3ea; --paper:#fffdf7; --paper2:#f1ede0;
    --ink:#19201b; --ink2:#41493f; --muted:#727a6e;
    --line:#dcd6c4; --line2:#c9c2ab;
    --red:#a8392f; --amber:#b8791f; --green:#2f7a55; --slate:#5a6b7a;
    --shadow:0 1px 2px rgba(15,58,44,.06),0 8px 24px -12px rgba(15,58,44,.18);
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
  body{background-image:radial-gradient(circle at 12% -8%,rgba(47,122,85,.07),transparent 42%),radial-gradient(circle at 92% 0%,rgba(195,154,62,.06),transparent 38%)}
  ::selection{background:var(--gold);color:#fff}
  .mono{font-family:'IBM Plex Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ---------- Header ---------- */
  header{background:linear-gradient(135deg,var(--pine),var(--pine2));color:#f4efe1;position:sticky;top:0;z-index:30;border-bottom:2px solid var(--gold)}
  .head-in{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;flex:1;min-width:220px}
  .mark{width:38px;height:38px;border:1.5px solid var(--gold);border-radius:9px;display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:700;font-size:20px;color:var(--gold);flex-shrink:0;background:rgba(0,0,0,.12)}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:.04em;line-height:1}
  .brand .sub{font-size:11px;color:#cdc7b3;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
  .lane{display:flex;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:3px;gap:2px}
  .lane button{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;color:#cdc7b3;letter-spacing:.03em;white-space:nowrap}
  .lane button.on{background:var(--gold);color:#23200f}

  /* ---------- Nav ---------- */
  nav{background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:67px;z-index:25}
  .nav-in{max-width:1180px;margin:0 auto;padding:0 12px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
  .nav-in::-webkit-scrollbar{display:none}
  .nav-in button{padding:13px 14px;font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}
  .nav-in button .ct{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--paper2);color:var(--ink2);padding:1px 6px;border-radius:20px}
  .nav-in button.on{color:var(--pine);border-bottom-color:var(--gold);font-weight:600}
  .nav-in button.on .ct{background:var(--sand);color:var(--pine)}

  main{max-width:1180px;margin:0 auto;padding:22px 20px 80px}
  .view{display:none;animation:fade .3s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2.vt{font-family:'Fraunces',serif;font-weight:600;font-size:24px;color:var(--pine);letter-spacing:.01em}
  .vh{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:6px;flex-wrap:wrap}
  .vsub{color:var(--muted);font-size:13.5px;margin-bottom:20px;max-width:680px}

  /* ---------- Buttons ---------- */
  .btn{background:var(--pine);color:#f4efe1;padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.15s;border:1px solid var(--pine)}
  .btn:hover{background:var(--pine2)}
  .btn.gold{background:var(--gold);color:#23200f;border-color:var(--gold)}
  .btn.gold:hover{background:var(--gold2)}
  .btn.ghost{background:transparent;color:var(--pine);border:1px solid var(--line2)}
  .btn.ghost:hover{background:var(--paper)}
  .btn.sm{padding:6px 11px;font-size:12px}

  /* ---------- Cards / grid ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:26px}
  .stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
  .stat .n{font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--pine);line-height:1}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:7px}
  .stat .d{font-size:11.5px;color:var(--ink2);margin-top:3px}

  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
  .panel-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .panel-h h3{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--pine)}
  .panel-h .hint{font-size:12px;color:var(--muted)}
  .panel-b{padding:8px 0}

  /* ---------- Ledger rows ---------- */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filters select,.search{background:var(--paper);border:1px solid var(--line2);border-radius:8px;padding:7px 10px;color:var(--ink);font-size:13px}
  .search{flex:1;min-width:160px}
  .node{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:flex-start;transition:.12s}
  .node:last-child{border-bottom:none}
  .node:hover{background:#fbf9f1}
  .node .body{flex:1;min-width:0}
  .node .top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .node .name{font-weight:600;font-size:15px;color:var(--ink)}
  .node .verdict{font-size:13px;color:var(--ink2);margin-top:5px;line-height:1.45}
  .node .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;align-items:center}
  .node .flag{font-size:11.5px;color:var(--amber);margin-top:8px;display:flex;gap:6px;align-items:flex-start}
  .node .flag svg{flex-shrink:0;margin-top:1px}
  .node .lesson{font-size:12px;color:var(--muted);font-style:italic;margin-top:7px;padding-left:10px;border-left:2px solid var(--line2)}
  .node .acts{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
  .node .acts button{font-size:11px;color:var(--muted);padding:3px 7px;border-radius:6px;border:1px solid transparent}
  .node .acts button:hover{background:var(--paper2);color:var(--pine);border-color:var(--line)}

  .tag{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
  .tag.lane{background:#eef2ec;color:var(--pine);border:1px solid #d6e0d2}
  .tag.cat{background:var(--paper2);color:var(--ink2);border:1px solid var(--line)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  .st-active{color:var(--green)} .st-active .dot,.dot.active{background:var(--green)}
  .st-fix{color:var(--amber)} .dot.fix{background:var(--amber)}
  .st-fold{color:var(--slate)} .dot.fold{background:var(--slate)}
  .st-parked{color:var(--muted)} .dot.parked{background:var(--muted)}
  .st-killed{color:var(--red)} .dot.killed{background:var(--red)}
  .st-archived{color:var(--muted)} .dot.archived{background:#b3ac96}
  .status-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

  /* ---------- Player rows ---------- */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:14px 18px}
  .player{border:1px solid var(--line);border-radius:12px;padding:14px;background:#fffefb}
  .player .pn{font-weight:600;font-size:15px}
  .player .pr{font-size:12.5px;color:var(--ink2);margin-top:2px}
  .player .pgood{font-size:12.5px;color:var(--ink2);margin-top:9px;line-height:1.45}
  .player .pv{margin-top:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .vbar{flex:1;height:6px;background:var(--paper2);border-radius:4px;overflow:hidden;min-width:80px}
  .vbar i{display:block;height:100%;background:linear-gradient(90deg,var(--fairway),var(--gold))}
  .vstat{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
  .v-verified{background:#e7f0e9;color:var(--green)}
  .v-unverified{background:#fbeee0;color:var(--amber)}
  .v-watch{background:#eef1f3;color:var(--slate)}

  /* ---------- Signal log ---------- */
  .sig{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:flex-start}
  .sig:last-child{border-bottom:none}
  .sig .src{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;background:var(--pine);color:#f4efe1;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .sig .src.t2{background:var(--slate)} .sig .src.t3{background:var(--amber)}
  .sig .st{font-weight:600;font-size:14px}
  .sig .sd{font-size:13px;color:var(--ink2);margin-top:3px;line-height:1.45}
  .sig .sm{font-size:11px;color:var(--muted);margin-top:6px;font-family:'IBM Plex Mono',monospace}

  .band{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.02em;white-space:nowrap;display:inline-block}
  .band-hot{background:#f6e1de;color:#a8392f}.band-warm{background:#fbf0db;color:#9a6914}.band-watch{background:#eef1f3;color:#5a6b7a}.band-filed{background:#efece2;color:#9a937f}
  .databar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
  .spill{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px}
  .spill.live{background:#e7f0e9;color:var(--green)}.spill.warn{background:#fbf0db;color:var(--amber)}
  .bs{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .bs-live{background:#e7f0e9;color:#2f7a55}.bs-free{background:#e3edf1;color:#3a6b86}.bs-manual{background:#fbf0db;color:#9a6914}.bs-tabled{background:#efece2;color:#9a937f}
  .qadd{display:flex;gap:8px;margin-bottom:14px}.qadd input{flex:1}
  .qbtn{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;border:1px solid var(--line2);color:var(--ink2);background:var(--paper);cursor:pointer}
  .qbtn:hover{background:var(--paper2);color:var(--pine)}
  .qbtn.go{background:var(--pine);color:#f4efe1;border-color:var(--pine)}.qbtn.go:hover{background:var(--pine2)}
  .tstat{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
  .ts-open{background:#eef1f3;color:#5a6b7a}.ts-doing{background:#fbf0db;color:#9a6914}.ts-done{background:#e7f0e9;color:#2f7a55}
  .tdone .name{text-decoration:line-through;color:var(--muted)}
  .dotbtn{font-size:18px;line-height:1;color:var(--muted);padding:2px 10px;border-radius:7px;border:1px solid transparent;background:var(--paper);cursor:pointer}
  .dotbtn:hover{background:var(--paper2);color:var(--pine);border-color:var(--line)}
  .menu{position:fixed;z-index:80;background:var(--paper);border:1px solid var(--line2);border-radius:12px;box-shadow:0 14px 44px rgba(15,32,27,.24);min-width:210px;max-width:246px;padding:6px;animation:pop .14s ease}
  .menu-item{display:block;width:100%;text-align:left;padding:9px 11px;border-radius:8px;font-size:13px;color:var(--ink);cursor:pointer}
  .menu-item:hover{background:var(--paper2)}
  .menu-item.danger{color:var(--red)}
  .menu-sep{height:1px;background:var(--line);margin:5px 4px}
  .src-block{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--gold2);font-weight:700;padding:7px 11px 4px}
  .req{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:flex-start}
  .req:last-child{border-bottom:none}
  .reqtype{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;background:var(--gold);color:#23200f;white-space:nowrap;margin-top:1px}
  .ts-review{background:#e9eef7;color:#3a5a86}
  .tile-click{cursor:pointer;transition:.12s}.tile-click:hover{border-color:var(--gold);transform:translateY(-1px)}
  .nm{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center;justify-content:space-between}.nm:last-child{border-bottom:none}
  .nm .nmt{font-size:13px;color:var(--ink2);line-height:1.4}
  .prog{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .prog-bar{flex:1;height:8px;background:var(--paper2);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .prog-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--fairway),var(--gold))}
  .prog-l{font-size:12px;font-weight:600;color:var(--ink2);white-space:nowrap;font-family:'IBM Plex Mono',monospace}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .col{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:90px}
  .col-h{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--pine);padding:2px 4px 9px}
  .col-ct{font-family:'IBM Plex Mono',monospace;background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:0 7px;color:var(--ink2)}
  .col-empty{text-align:center;color:var(--line2);font-size:18px;padding:8px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;box-shadow:0 1px 2px rgba(15,58,44,.05)}
  .card.tdone .card-title{text-decoration:line-through;color:var(--muted)}
  .card-top{display:flex;gap:7px;align-items:flex-start}
  .card-title{font-size:13px;font-weight:500;line-height:1.35}
  .card-link{font-size:11px;color:var(--muted);margin-top:6px;padding-left:14px}
  .card-acts{display:flex;gap:5px;align-items:center;margin-top:9px}
  .mv{font-size:13px;font-weight:700;width:30px;height:27px;border-radius:7px;border:1px solid var(--line2);background:var(--paper2);color:var(--pine);cursor:pointer}
  .mv:hover:not([disabled]){background:var(--pine);color:#f4efe1}.mv[disabled]{opacity:.3;cursor:default}
  .dotbtn.sm2{font-size:15px;padding:1px 8px;margin-left:auto}
  @media(max-width:720px){.board{grid-template-columns:1fr}}

  /* ---------- Query templates ---------- */
  .qt{padding:14px 18px;border-bottom:1px solid var(--line)}
  .qt:last-child{border-bottom:none}
  .qt .qh{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .qt .qn{font-weight:600;font-size:14px}
  .qt .qcode{font-family:'IBM Plex Mono',monospace;font-size:12px;background:#1d2a22;color:#cfe6d8;padding:10px 12px;border-radius:8px;margin-top:9px;white-space:pre-wrap;word-break:break-word;line-height:1.5}
  .qt .qwhy{font-size:12px;color:var(--muted);margin-top:7px}

  /* ---------- Cadence ---------- */
  .cad{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .cad:last-child{border-bottom:none}
  .cad .cn{font-weight:600;font-size:14px}
  .cad .cf{font-size:12px;color:var(--muted);margin-top:2px}
  .cad .cright{display:flex;align-items:center;gap:10px}
  .due{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .due.ok{background:#e7f0e9;color:var(--green)} .due.soon{background:#fbf2e0;color:var(--amber)} .due.over{background:#f6e3e0;color:var(--red)}

  /* ---------- Macro ---------- */
  .macro-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;padding:16px 18px}
  .mcard{border:1px solid var(--line);border-radius:11px;padding:13px;background:#fffefb}
  .mcard .mq{font-size:12px;color:var(--ink2);line-height:1.35;min-height:34px}
  .mcard .mp{font-family:'Fraunces',serif;font-size:27px;font-weight:600;color:var(--pine);margin-top:8px}
  .mcard .mt{font-size:10.5px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
  .banner{margin:0 18px 4px;padding:11px 14px;background:#f3efe2;border:1px solid var(--line2);border-radius:10px;font-size:12.5px;color:var(--ink2);display:flex;gap:9px;align-items:flex-start}
  .banner svg{flex-shrink:0;margin-top:1px;color:var(--gold2)}

  .empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(15,32,27,.5);backdrop-filter:blur(3px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:var(--cream);border-radius:16px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);border:1px solid var(--line2);animation:pop .2s ease}
  @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  .modal-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-h h3{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--pine)}
  .modal-b{padding:18px 20px;max-height:64vh;overflow-y:auto}
  .modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
  .fld input,.fld select,.fld textarea{width:100%;background:var(--paper);border:1px solid var(--line2);border-radius:8px;padding:9px 11px;color:var(--ink)}
  .fld textarea{resize:vertical;min-height:62px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .x{font-size:22px;color:var(--muted);line-height:1;padding:0 4px}
  .x:hover{color:var(--ink)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--pine);color:#f4efe1;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:60;opacity:0;transition:.25s;box-shadow:var(--shadow);border:1px solid var(--gold)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:600px){
    main{padding:18px 12px 80px}
    .node{flex-direction:column;gap:8px}
    .node .acts{flex-direction:row;flex-wrap:wrap}
    .row2{grid-template-columns:1fr}
    .brand h1{font-size:18px}
    nav{top:64px}
  }
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="brand">
      <div class="mark">D</div>
      <div>
        <h1>DEALBOARD</h1>
        <div class="sub">Deal Intelligence &middot; Network &middot; Sales Command</div>
      </div>
    </div>
    <div class="lane" id="laneToggle">
      <button data-lane="all" class="on">All Lanes</button>
      <button data-lane="V1">V1 · Small Ticket</button>
      <button data-lane="V2">V2 · Middle Market</button>
    </div>
  </div>
</header>

<nav><div class="nav-in" id="navBar"></div></nav>

<main>
  <section class="view on" id="v-dash"></section>
  <section class="view" id="v-ledger"></section>
  <section class="view" id="v-tasks"></section>
  <section class="view" id="v-snoozed"></section>
  <section class="view" id="v-players"></section>
  <section class="view" id="v-intel"></section>
  <section class="view" id="v-cascade"></section>
  <section class="view" id="v-buildseq"></section>

/* ---------- STATE NORMALIZATION (migration / crash-proofing) ---------- */
function normalizeState(s){
  s=(s&&typeof s==='object')?s:{};
  const seed=seedState();
  ['nodes','players','signals','queries','cadence','cascades','drift','buildseq','tasks','requests'].forEach(k=>{ if(!Array.isArray(s[k])) s[k]=seed[k]; });
  if(!s.macro||typeof s.macro!=='object'||!Array.isArray(s.macro.cards)) s.macro=seed.macro;
  s.nodes.forEach(n=>{ if(!n.id)n.id=uid(); if(!n.status)n.status='active'; if(!n.lane)n.lane='both'; if(!n.cat)n.cat='Discovery / Intelligence'; if(n.verdict==null)n.verdict=''; if(n.flag==null)n.flag=''; if(n.lesson==null)n.lesson=''; });
  s.players.forEach(p=>{ if(!p.id)p.id=uid(); if(typeof p.score!=='number'||isNaN(p.score))p.score=50; if(!p.vstat)p.vstat='unverified'; if(p.role==null)p.role=''; if(p.good==null)p.good=''; });
  s.signals.forEach(g=>{ if(!g.id)g.id=uid(); if(typeof g.tier!=='number')g.tier=2; if(!g.fit)g.fit='both'; if(!g.urgency)g.urgency='med'; if(!g.verified)g.verified='single'; if(!g.created)g.created=todayISO(); if(!g.meta)g.meta='logged '+todayISO(); if(g.detail==null)g.detail=''; if(g.link==null)g.link=''; });
  s.cadence.forEach(c=>{ if(!c.id)c.id=uid(); if(typeof c.intervalDays!=='number')c.intervalDays=7; if(!c.last)c.last=todayISO(); });
  s.tasks.forEach(t=>{ if(!t.id)t.id=uid(); if(!t.status)t.status='open'; if(!t.priority)t.priority='med'; if(!t.created)t.created=todayISO(); if(t.link===undefined)t.link=null; });
  return s;
}

async function load(){
  const raw=await Store.get(KEY);
  if(raw){ try{ S=normalizeState(JSON.parse(raw)); }catch(e){ S=seedState(); } }
  else { S=normalizeState(seedState()); await save(); }
  if(!S||!Array.isArray(S.nodes)) S=seedState();
}
async function save(){ await Store.set(KEY, JSON.stringify(S)); }

/* ---------- ACTION MENU (dropdowns) ---------- */
var menuEl=null;
function closeMenu(){ if(menuEl){menuEl.remove();menuEl=null;} }
function openMenu(ev,kind,id){
  ev.stopPropagation(); closeMenu();
  const items=menuItems(kind,id);
  menuEl=document.createElement('div'); menuEl.className='menu';
  menuEl.innerHTML=items.map(it=>{
    if(it.sep)return '<div class="menu-sep"></div>';
    if(it.hdr)return `<div class="src-block">${esc(it.l)}</div>`;
    return `<button class="menu-item ${it.danger?'danger':''}" onclick="closeMenu();${it.f}">${esc(it.l)}</button>`;
  }).join('');
  document.body.appendChild(menuEl);
  const r=ev.target.getBoundingClientRect(), mw=230;
  let left=Math.max(10,Math.min(r.right-mw, window.innerWidth-mw-10));
  let top=r.bottom+6; const mh=menuEl.offsetHeight||320;
  if(top+mh>window.innerHeight-10) top=Math.max(10,r.top-mh-6);
  menuEl.style.left=left+'px'; menuEl.style.top=top+'px';
}
function menuItems(kind,id){
  let items=[];
  if(kind==='signal'){
    items=[{l:'Convert to task',f:`sigToTask('${id}')`},{l:'Merge into…',f:`openMergeSignal('${id}')`},{l:'Snooze to date…',f:`openSnooze('signal','${id}')`},{l:'Remove / kill',f:`delSignal('${id}')`,danger:true}];
  }else if(kind==='task'){
    const t=S.tasks.find(x=>x.id===id)||{};
    items=[{l:t.status==='done'?'Reopen':(t.status==='open'?'Start':'Complete'),f:`cycleTask('${id}')`},{l:'Bump priority',f:`bumpTask('${id}')`},{l:'Edit',f:`openTask('${id}')`},{l:'Snooze to date…',f:`openSnooze('task','${id}')`},{l:'Remove / kill',f:`delTask('${id}')`,danger:true}];
  }else if(kind==='node'){
    items=[{l:'Edit',f:`openNode('${id}')`},{l:'Advance status',f:`cycleStatus('${id}')`},{l:'Spawn task',f:`nodeToTask('${id}')`},{l:'Remove / kill',f:`delNode('${id}')`,danger:true}];
  }else if(kind==='player'){
    items=[{l:'Edit',f:`openPlayer('${id}')`},{l:'Spawn task',f:`playerToTask('${id}')`},{l:'Remove / kill',f:`delPlayer('${id}')`,danger:true}];
  }
  items.push({sep:true},{hdr:true,l:'Source & qualify'});
  items.push({l:'⌕ Find similar qualified targets',f:`queueRequest('similar','${kind}','${id}')`});
  items.push({l:'＋ Queue sourcing request',f:`queueRequest('source','${kind}','${id}')`});
  items.push({l:'? Ask a question',f:`queueRequest('ask','${kind}','${id}')`});
  return items;
}
function itemLabel(kind,id){
  let x;
  if(kind==='signal')x=S.signals.find(s=>s.id===id),x=x&&x.title;
  else if(kind==='task')x=S.tasks.find(s=>s.id===id),x=x&&x.title;
  else if(kind==='node')x=S.nodes.find(s=>s.id===id),x=x&&x.name;
  else if(kind==='player'){const p=S.players.find(s=>s.id===id);x=p&&(p.name+' · '+p.role);}
  return x||'';
}
/* ---------- SNOOZE ---------- */

/* ---------- REQUESTS (bottom-of-menu actions) ---------- */
function queueRequest(type,kind,id){
  const label=itemLabel(kind,id);
  if(type==='ask'){ openAsk(kind,id,label); return; }
  const note=type==='similar'
    ? 'Find companies similar to: '+label+' — same sector/NAICS, revenue band ($1MM–$25MM V1 / $50MM–$1Bn V2), equipment profile; verified + contact targets.'
    : 'Source new qualified targets like: '+label+' — log verified candidates + contacts.';
  S.requests.push({id:uid(),type,kind,refLabel:label,note,status:'open',created:todayISO()});
  save().then(()=>{renderAll();toast("Queued — I'll run it in our session");});
}
function openAsk(kind,id,label){
  ov.innerHTML=`<div class="modal"><div class="modal-h"><h3>Ask a question</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-b">
      <div class="vsub" style="margin-bottom:10px">About: <b>${esc(label)}</b>. I'll answer it in our session and log it back here.</div>
      <div class="fld"><label>Your question</label><textarea id="ask_q" placeholder="What do you want to know before building / deciding?"></textarea></div>
    </div>
    <div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn gold" onclick="saveAsk('${kind}','${id}')">Queue question</button></div></div>`;
  ov.classList.add('open');
}
async function saveAsk(kind,id){
  const q=document.getElementById('ask_q').value.trim(); if(!q){toast('Type a question');return;}
  S.requests.push({id:uid(),type:'ask',kind,refLabel:itemLabel(kind,id),note:q,status:'open',created:todayISO()});

}

/* ---------- SIGNAL TRIAGE / ANTI-JUNK SCORING ---------- */
const BANDS={hot:['Hot','🔴'],warm:['Warm','🟡'],watch:['Watch','⚪'],filed:['Filed','🗑']};
function daysSince(iso){ if(!iso) return 0; return Math.max(0,Math.floor((Date.now()-new Date(iso).getTime())/86400000)); }
function scoreSignal(s){
  let base=s.tier===1?40:(s.tier===2?25:8);
  let fit; if(s.fit==='off')fit=-40; else if(s.fit==='both')fit=20; else if(s.fit==='V1'||s.fit==='V2')fit=18; else fit=0;
  const uMap={high:30,med:18,low:8,evergreen:2}; let urg=uMap[s.urgency]!=null?uMap[s.urgency]:12;
  const vMap={corroborated:20,single:5,unverified:-8}; let ver=vMap[s.verified]!=null?vMap[s.verified]:0;
  let decay=-Math.min(daysSince(s.created)*1.2,30);
  let total=Math.round(base+fit+urg+ver+decay);
  if(s.fit==='off') return {score:Math.max(total,0),band:'filed'};
  if(s.tier===3 && s.verified!=='corroborated') total=Math.min(total,35); // Tier-3 can't go Hot without corroboration
  const band=total>=70?'hot':total>=45?'warm':total>=22?'watch':'filed';
  return {score:Math.max(total,0),band};
}
function bandChip(b){const x=BANDS[b];return `<span class="band band-${b}">${x[1]} ${x[0]}</span>`;}
function laneFitOK(s){ if(lane==='all')return true; if(s.fit==='both')return true; return s.fit===lane; }
function priorityInbox(){
  const scored=S.signals.map(s=>({s,...scoreSignal(s)})).filter(x=>laneFitOK(x.s)&&!isSnoozed(x.s));
  const hot=scored.filter(x=>x.band==='hot').sort((a,b)=>b.score-a.score);
  const warm=scored.filter(x=>x.band==='warm').sort((a,b)=>b.score-a.score);
  const watchCt=scored.filter(x=>x.band==='watch').length, filedCt=scored.filter(x=>x.band==='filed').length;
  const show=[...hot,...warm];
  if(!show.length) return `<div class="empty">No Hot or Warm signals in this lane. ⚪ ${watchCt} on watch · 🗑 ${filedCt} filed.</div>`;
  return show.map(x=>`<div class="node"><div class="body"><div class="top">${bandChip(x.band)}<span class="name">${esc(x.s.title)}</span><span class="tag cat">${esc(x.s.src)}</span></div><div class="verdict">${esc(x.s.detail)}</div><div class="sm" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px">score ${x.score} · ${esc(x.s.meta)}</div></div></div>`).join('')
    + `<div style="padding:11px 18px;color:var(--muted);font-size:12px">⚪ ${watchCt} on watch · 🗑 ${filedCt} filed as low-fit / junk</div>`;
}
function dataBar(){
  const pill=storageLive?'<span class="spill live">● Saved to this device</span>':'<span class="spill warn">● Session only — export to keep</span>';
  return `<div class="databar">${pill}<button class="btn ghost sm" onclick="exportState()">⤓ Export backup</button><button class="btn ghost sm" onclick="document.getElementById('importFile').click()">⤒ Import</button><input type="file" id="importFile" accept="application/json" style="display:none" onchange="importState(event)"></div>`;
}
async function checkStorage(){
  try{ if(typeof window!=='undefined' && window.storage){ const p='dealboard_probe_'+Date.now(); await window.storage.set(p,'1'); const r=await window.storage.get(p); storageLive=!!(r&&r.value==='1'); try{await window.storage.delete(p);}catch(e){} } else storageLive=false; }
  catch(e){ storageLive=false; }
}
function exportState(){
  try{ const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='dealboard-backup-'+todayISO()+'.json'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); toast('Backup exported'); }
  catch(e){ toast('Export failed'); }
}
function importState(ev){
  const f=ev.target.files&&ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=async()=>{ try{ const obj=JSON.parse(rd.result); if(!obj||(!Array.isArray(obj.nodes)&&!Array.isArray(obj.signals)))throw new Error('not Dealboard'); S=normalizeState(obj); await save(); renderAll(); toast('Backup imported'); }catch(e){ toast('Import failed — not a valid Dealboard backup'); } };
  rd.readAsText(f);
}

/* ---------- ROUTER ---------- */
function setView(v){view=v;document.querySelectorAll('.view').forEach(s=>s.classList.remove('on'));document.getElementById('v-'+v).classList.add('on');renderNav();window.scrollTo({top:0,behavior:'smooth'});}
const RENDER={dash:renderDash,ledger:renderLedger,tasks:renderTasks,snoozed:renderSnoozed,players:renderPlayers,intel:renderIntel,cascade:renderCascade,cadence:renderCadence,macro:renderMacro,buildseq:renderBuildSeq,archive:renderArchive};
function renderAll(){
  try{ renderNav(); }catch(e){}
  for(const k in RENDER){ try{ RENDER[k](); }catch(e){ const el=document.getElementById('v-'+k); if(el) el.innerHTML='<div class="empty">This view hit an error and was isolated so the rest keeps working.<br><span class="mono" style="font-size:11px">'+esc(e.message)+'</span></div>'; } }
}

document.getElementById('navBar').addEventListener('click',e=>{const b=e.target.closest('button[data-v]');if(b)setView(b.dataset.v);});
document.getElementById('laneToggle').addEventListener('click',e=>{const b=e.target.closest('button[data-lane]');if(!b)return;lane=b.dataset.lane;document.querySelectorAll('#laneToggle button').forEach(x=>x.classList.toggle('on',x===b));renderAll();});
document.addEventListener('click',e=>{ if(menuEl && !menuEl.contains(e.target) && !(e.target.closest&&e.target.closest('[data-menu-btn]'))) closeMenu(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeMenu(); });
window.addEventListener('scroll',()=>closeMenu(),true);

/* ---------- BOOT ---------- */
(async function boot(){
  await load();
  await checkStorage();
  renderAll();
  setView('dash');
})();
</script>
</body>
</html>
